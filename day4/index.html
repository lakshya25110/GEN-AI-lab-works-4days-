<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Crew | AI Editorial Dashboard</title>
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #FF4B4B;
            --bg: #0e1117;
            --card: #161b22;
            --text: #e6edf3;
            --border: #30363d;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 { color: var(--primary); font-size: 2.5rem; }
        .form-card {
            background: var(--card);
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }
        button:disabled { background: #555; cursor: not-allowed; }
        
        #result-card {
            display: none;
            background: var(--card);
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            line-height: 1.6;
        }
        .spinner {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }
        .loading-text { color: var(--primary); font-weight: bold; }
        
        /* Markdown Styling */
        pre { background: #000; padding: 1rem; border-radius: 8px; overflow-x: auto; }
        code { font-family: monospace; }
        h1, h2, h3 { border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✍️ Blog Generation Crew</h1>
            <p>Your Professional AI Editorial Team starts here.</p>
        </div>

        <div class="form-card">
            <div class="input-group">
                <label for="topic">Blog Topic</label>
                <input type="text" id="topic" placeholder="e.g. Future of Generative AI" required>
            </div>
            <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label for="audience">Audience</label>
                    <select id="audience">
                        <option value="Professional">Professional</option>
                        <option value="General">General</option>
                        <option value="Technical">Technical</option>
                    </select>
                </div>
                <div>
                    <label for="tone">Tone</label>
                    <select id="tone">
                        <option value="Informative">Informative</option>
                        <option value="Engaging">Engaging</option>
                        <option value="Formal">Formal</option>
                    </select>
                </div>
            </div>
            <button id="generate-btn" onclick="generateBlog()">🚀 Kickoff Team</button>
        </div>

        <div id="spinner" class="spinner">
            <div class="loading-text">🔍 Team is Researching, Writing, and Editing...</div>
            <p>This may take up to 2 minutes. Please don't refresh.</p>
        </div>

        <div id="result-card">
            <div id="markdown-content"></div>
            <hr style="border: 0.5px solid var(--border); margin: 2rem 0;">
            <button onclick="downloadMarkdown()" style="background: #238636; max-width: 250px;">📥 Download .md</button>
        </div>
    </div>

    <script>
        let lastResult = "";

        async function generateBlog() {
            const topic = document.getElementById('topic').value;
            const audience = document.getElementById('audience').value;
            const tone = document.getElementById('tone').value;
            const btn = document.getElementById('generate-btn');
            const spinner = document.getElementById('spinner');
            const resultCard = document.getElementById('result-card');

            if (!topic) {
                alert("Please enter a topic!");
                return;
            }

            // UI State
            btn.disabled = true;
            spinner.style.display = 'block';
            resultCard.style.display = 'none';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, audience, tone })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    lastResult = data.blog_post;
                    document.getElementById('markdown-content').innerHTML = marked.parse(lastResult);
                    resultCard.style.display = 'block';
                } else {
                    alert("Error: " + (data.detail || "Generation failed."));
                }
            } catch (error) {
                alert("Connection failed: " + error.message);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        function downloadMarkdown() {
            const topic = document.getElementById('topic').value || "blog";
            const blob = new Blob([lastResult], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `blog_${topic.toLowerCase().replace(/ /g, '_')}.md`;
            a.click();
        }
    </script>
</body>
</html>
